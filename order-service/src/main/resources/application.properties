spring.datasource.url=jdbc:postgresql://localhost:5432/orders-service
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.compression-type=snappy

spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

application.kakfa.topics.product=product-events
application.kafka.topics.inventory=inventory-events

application.outbox.publish-delay-ms:5000

server.port=8082

stock.service.base.url=http://localhost:8081
stock.service.get.product.url=/api/v1/products/sku/{sku}

spring.kafka.consumer.group-id=order-service